<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopVerse – E-Commerce Platform</title>
  <meta name="description" content="A modern e-commerce platform with cart, filters, and checkout.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: rgba(255,255,255,0.08);
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #f1f1f5;
      --muted: #888899;
      --card: #1e1e2e;
      --success: #10b981;
      --danger: #ef4444;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* NAV */
    nav {
      background: rgba(15,15,20,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, #7c3aed, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-right { display: flex; align-items: center; gap: 1.2rem; }
    .search-bar { display: flex; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.5rem 1rem; gap: 0.5rem; }
    .search-bar input { background: none; border: none; color: var(--text); font-family: inherit; font-size: 0.9rem; outline: none; width: 200px; }
    .cart-btn {
      position: relative; background: var(--accent); border: none; color: #fff;
      border-radius: 10px; padding: 0.5rem 1.2rem; font-family: inherit; font-size: 0.9rem;
      font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
      transition: all 0.2s;
    }
    .cart-btn:hover { background: #6d28d9; transform: translateY(-1px); }
    .cart-count {
      background: #ef4444; color: #fff; border-radius: 50%; width: 20px; height: 20px;
      font-size: 0.7rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
      position: absolute; top: -8px; right: -8px;
    }

    /* HERO BANNER */
    .hero-banner {
      background: linear-gradient(135deg, rgba(124,58,237,0.2) 0%, rgba(6,182,212,0.15) 100%);
      border-bottom: 1px solid var(--border);
      padding: 3rem 2rem;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .hero-banner::before {
      content: ''; position: absolute; top: -50%; left: -20%; width: 60%; height: 200%;
      background: radial-gradient(ellipse, rgba(124,58,237,0.15), transparent 70%);
    }
    .hero-banner h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    .hero-banner h1 span { background: linear-gradient(135deg, #7c3aed, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero-banner p { color: var(--muted); font-size: 1.05rem; }

    /* LAYOUT */
    .main-layout { display: flex; max-width: 1400px; margin: 0 auto; padding: 2rem; gap: 2rem; }

    /* SIDEBAR */
    .sidebar { width: 240px; flex-shrink: 0; }
    .filter-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .filter-section h3 { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 1rem; }
    .filter-option { display: flex; align-items: center; gap: 0.6rem; padding: 0.35rem 0; cursor: pointer; font-size: 0.9rem; color: var(--text); }
    .filter-option input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
    .filter-option:hover { color: #a78bfa; }
    .price-slider { width: 100%; accent-color: var(--accent); }
    .price-range-label { display: flex; justify-content: space-between; font-size: 0.82rem; color: var(--muted); margin-top: 0.5rem; }

    /* PRODUCTS */
    .products-area { flex: 1; }
    .products-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .products-header h2 { font-size: 1.2rem; font-weight: 700; }
    .products-count { color: var(--muted); font-size: 0.9rem; }
    .sort-select {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 0.4rem 0.8rem; font-family: inherit; font-size: 0.9rem; cursor: pointer;
    }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.25rem; }
    .product-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; transition: all 0.3s; cursor: pointer;
      display: flex; flex-direction: column;
    }
    .product-card:hover { transform: translateY(-4px); border-color: rgba(124,58,237,0.4); box-shadow: 0 8px 30px rgba(124,58,237,0.15); }
    .product-img {
      height: 180px; display: flex; align-items: center; justify-content: center;
      font-size: 4rem; background: linear-gradient(135deg, var(--surface2), var(--surface));
      position: relative;
    }
    .badge {
      position: absolute; top: 10px; left: 10px; padding: 0.2rem 0.6rem;
      border-radius: 20px; font-size: 0.72rem; font-weight: 700;
    }
    .badge-new { background: rgba(16,185,129,0.2); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
    .badge-sale { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .badge-hot { background: rgba(245,158,11,0.2); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
    .product-info { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
    .product-category { font-size: 0.75rem; color: var(--accent2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .product-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.4rem; line-height: 1.3; }
    .product-rating { display: flex; align-items: center; gap: 0.3rem; font-size: 0.8rem; color: #f59e0b; margin-bottom: 0.8rem; }
    .product-rating span { color: var(--muted); }
    .product-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .product-price { font-size: 1.1rem; font-weight: 800; color: #a78bfa; }
    .product-price .original { font-size: 0.8rem; color: var(--muted); text-decoration: line-through; font-weight: 400; margin-right: 0.3rem; }
    .add-btn {
      background: linear-gradient(135deg, var(--accent), #6366f1); border: none; color: #fff;
      border-radius: 8px; padding: 0.4rem 0.8rem; font-family: inherit; font-size: 0.82rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .add-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(124,58,237,0.4); }
    .add-btn.added { background: linear-gradient(135deg, var(--success), #059669); }

    /* CART DRAWER */
    .cart-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .cart-overlay.open { opacity: 1; pointer-events: all; }
    .cart-drawer {
      position: fixed; right: 0; top: 0; bottom: 0; width: 420px; max-width: 95vw;
      background: var(--surface); border-left: 1px solid var(--border);
      z-index: 201; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column;
    }
    .cart-drawer.open { transform: translateX(0); }
    .cart-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .cart-header h2 { font-size: 1.2rem; font-weight: 700; }
    .close-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 0.4rem 0.8rem; cursor: pointer; font-size: 1.1rem; }
    .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
    .cart-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 0.75rem; }
    .cart-item-emoji { font-size: 2rem; width: 50px; text-align: center; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 0.9rem; font-weight: 600; }
    .cart-item-price { font-size: 0.85rem; color: #a78bfa; font-weight: 700; }
    .qty-controls { display: flex; align-items: center; gap: 0.5rem; }
    .qty-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
    .qty-btn:hover { background: var(--accent); border-color: var(--accent); }
    .qty-value { font-weight: 700; min-width: 20px; text-align: center; }
    .remove-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1rem; padding: 0.2rem; }
    .cart-footer { padding: 1.5rem; border-top: 1px solid var(--border); }
    .cart-total { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; }
    .checkout-btn {
      width: 100%; background: linear-gradient(135deg, #7c3aed, #06b6d4); border: none; color: #fff;
      border-radius: 12px; padding: 0.9rem; font-family: inherit; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .checkout-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,58,237,0.4); }
    .empty-cart { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty-cart .icon { font-size: 3rem; margin-bottom: 1rem; }

    /* SUCCESS MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 3rem; text-align: center; max-width: 400px; width: 90%;
      transform: scale(0.8); transition: transform 0.3s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal-icon { font-size: 4rem; margin-bottom: 1rem; }
    .modal h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    .modal p { color: var(--muted); margin-bottom: 2rem; }
    .modal-btn { background: linear-gradient(135deg, #10b981, #059669); border: none; color: #fff; border-radius: 12px; padding: 0.8rem 2rem; font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--success); color: #fff; padding: 0.75rem 1.5rem; border-radius: 30px;
      font-weight: 600; font-size: 0.9rem; z-index: 400; transition: transform 0.3s;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* BACK LINK */
    .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--muted); font-size: 0.85rem; text-decoration: none; padding: 1rem 2rem 0; }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>

<nav>
  <div class="logo">ShopVerse</div>
  <div class="nav-right">
    <div class="search-bar">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search products…">
    </div>
    <button class="cart-btn" id="cartBtn" onclick="toggleCart()">
      🛒 Cart
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<a href="../../index.html" class="back-link">← Back to Portfolio</a>

<div class="hero-banner">
  <h1>Discover <span>Amazing</span> Products</h1>
  <p>Premium quality items curated just for you</p>
</div>

<div class="main-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filter-section">
      <h3>Category</h3>
      <label class="filter-option"><input type="checkbox" value="Electronics" onchange="applyFilters()" checked> Electronics</label>
      <label class="filter-option"><input type="checkbox" value="Fashion" onchange="applyFilters()" checked> Fashion</label>
      <label class="filter-option"><input type="checkbox" value="Books" onchange="applyFilters()" checked> Books</label>
      <label class="filter-option"><input type="checkbox" value="Home" onchange="applyFilters()" checked> Home &amp; Garden</label>
      <label class="filter-option"><input type="checkbox" value="Gaming" onchange="applyFilters()" checked> Gaming</label>
      <label class="filter-option"><input type="checkbox" value="Sports" onchange="applyFilters()" checked> Sports</label>
    </div>
    <div class="filter-section">
      <h3>Max Price</h3>
      <input type="range" class="price-slider" id="priceSlider" min="0" max="500" value="500" oninput="updatePrice(this.value)">
      <div class="price-range-label"><span>$0</span><span id="priceLabel">$500</span></div>
    </div>
    <div class="filter-section">
      <h3>Rating</h3>
      <label class="filter-option"><input type="radio" name="rating" value="0" onchange="applyFilters()" checked> All Ratings</label>
      <label class="filter-option"><input type="radio" name="rating" value="4" onchange="applyFilters()"> ⭐ 4+ Stars</label>
      <label class="filter-option"><input type="radio" name="rating" value="4.5" onchange="applyFilters()"> ⭐ 4.5+ Stars</label>
    </div>
  </aside>

  <!-- PRODUCTS -->
  <main class="products-area">
    <div class="products-header">
      <div>
        <h2>All Products <span class="products-count" id="productsCount"></span></h2>
      </div>
      <select class="sort-select" id="sortSelect" onchange="applyFilters()">
        <option value="default">Sort: Featured</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating">Top Rated</option>
        <option value="newest">Newest</option>
      </select>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </main>
</div>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h2>🛒 Your Cart</h2>
    <button class="close-btn" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter"></div>
</div>

<!-- SUCCESS MODAL -->
<div class="modal-overlay" id="successModal">
  <div class="modal">
    <div class="modal-icon">🎉</div>
    <h2>Order Placed!</h2>
    <p>Your order has been successfully placed. Thank you for shopping with ShopVerse!</p>
    <button class="modal-btn" onclick="closeModal()">Continue Shopping</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const products = [
  { id:1, name:'Pro Wireless Headphones', category:'Electronics', price:149, original:199, rating:4.8, reviews:2340, emoji:'🎧', badge:'sale' },
  { id:2, name:'Mechanical Gaming Keyboard', category:'Gaming', price:89, rating:4.7, reviews:1890, emoji:'⌨️', badge:'hot' },
  { id:3, name:'4K Webcam Ultra HD', category:'Electronics', price:79, original:99, rating:4.5, reviews:654, emoji:'📷', badge:'sale' },
  { id:4, name:'Designer Sneakers', category:'Fashion', price:129, rating:4.6, reviews:987, emoji:'👟', badge:'new' },
  { id:5, name:'Smart Home Speaker', category:'Electronics', price:199, rating:4.9, reviews:3210, emoji:'🔊', badge:'hot' },
  { id:6, name:'JavaScript: The Definitive Guide', category:'Books', price:49, rating:4.8, reviews:1230, emoji:'📚', badge:'new' },
  { id:7, name:'Yoga Mat Premium', category:'Sports', price:39, original:59, rating:4.4, reviews:534, emoji:'🧘', badge:'sale' },
  { id:8, name:'RGB Gaming Mouse', category:'Gaming', price:59, rating:4.6, reviews:2100, emoji:'🖱️', badge:'' },
  { id:9, name:'Leather Wallet', category:'Fashion', price:45, rating:4.3, reviews:432, emoji:'👛', badge:'' },
  { id:10, name:'Indoor Plant Set', category:'Home', price:35, rating:4.7, reviews:876, emoji:'🌿', badge:'new' },
  { id:11, name:'Coffee Maker Pro', category:'Home', price:89, original:120, rating:4.5, reviews:1456, emoji:'☕', badge:'sale' },
  { id:12, name:'Running Shoes Air', category:'Sports', price:119, rating:4.6, reviews:789, emoji:'👟', badge:'' },
  { id:13, name:'Portable Charger 20000mAh', category:'Electronics', price:39, rating:4.4, reviews:2870, emoji:'🔋', badge:'' },
  { id:14, name:'Vintage Denim Jacket', category:'Fashion', price:95, rating:4.5, reviews:345, emoji:'🧥', badge:'new' },
  { id:15, name:'Chess Set Deluxe', category:'Gaming', price:65, rating:4.9, reviews:234, emoji:'♟️', badge:'' },
  { id:16, name:'Water Bottle Insulated', category:'Sports', price:29, rating:4.8, reviews:3400, emoji:'🧊', badge:'hot' },
];

let cart = [];
let maxPrice = 500;

function stars(r) {
  return '★'.repeat(Math.floor(r)) + (r%1>=0.5?'½':'') + '(' + (r) + ')';
}

function renderProducts(list) {
  const grid = document.getElementById('productsGrid');
  document.getElementById('productsCount').textContent = `(${list.length})`;
  if (list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--muted)">
      <div style="font-size:3rem;margin-bottom:1rem">🔍</div>
      <p>No products match your filters.</p>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(p => {
    const inCart = cart.find(c => c.id === p.id);
    return `
    <div class="product-card" id="card${p.id}">
      <div class="product-img">
        ${p.emoji}
        ${p.badge ? `<span class="badge badge-${p.badge}">${p.badge.toUpperCase()}</span>` : ''}
      </div>
      <div class="product-info">
        <div class="product-category">${p.category}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-rating">★★★★${p.rating>=4.5?'★':'☆'} <span>${p.rating} (${p.reviews.toLocaleString()})</span></div>
        <div class="product-footer">
          <div class="product-price">
            ${p.original ? `<span class="original">$${p.original}</span>` : ''}
            $${p.price}
          </div>
          <button class="add-btn ${inCart?'added':''}" id="btn${p.id}" onclick="addToCart(${p.id})">
            ${inCart ? '✓ Added' : '+ Cart'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function applyFilters() {
  const checked = [...document.querySelectorAll('.filter-section input[type=checkbox]:checked')].map(el => el.value);
  const rating = parseFloat(document.querySelector('input[name=rating]:checked').value);
  const sort = document.getElementById('sortSelect').value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  let list = products.filter(p =>
    checked.includes(p.category) &&
    p.price <= maxPrice &&
    p.rating >= rating &&
    p.name.toLowerCase().includes(search)
  );

  if (sort === 'price-asc') list.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') list.sort((a,b) => b.price - a.price);
  else if (sort === 'rating') list.sort((a,b) => b.rating - a.rating);
  else if (sort === 'newest') list.sort((a,b) => b.id - a.id);

  renderProducts(list);
}

function updatePrice(val) {
  maxPrice = parseInt(val);
  document.getElementById('priceLabel').textContent = `$${val}`;
  applyFilters();
}

function addToCart(id) {
  const p = products.find(x => x.id === id);
  const existing = cart.find(x => x.id === id);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({...p, qty: 1});
  }
  updateCartUI();
  const btn = document.getElementById('btn' + id);
  if (btn) { btn.textContent = '✓ Added'; btn.classList.add('added'); }
  showToast(`${p.emoji} ${p.name} added to cart!`);
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cartCount').textContent = total;

  const container = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');

  if (cart.length === 0) {
    container.innerHTML = `<div class="empty-cart"><div class="icon">🛒</div><p>Your cart is empty</p></div>`;
    footer.innerHTML = '';
    return;
  }

  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-emoji">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">$${(item.price * item.qty).toFixed(2)}</div>
      </div>
      <div class="qty-controls">
        <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
        <span class="qty-value">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
      </div>
      <button class="remove-btn" onclick="removeItem(${item.id})">🗑</button>
    </div>
  `).join('');

  const grandTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  footer.innerHTML = `
    <div class="cart-total"><span>Total</span><span>$${grandTotal.toFixed(2)}</span></div>
    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>
  `;
}

function changeQty(id, delta) {
  const item = cart.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeItem(id);
  else updateCartUI();
}

function removeItem(id) {
  cart = cart.filter(x => x.id !== id);
  const btn = document.getElementById('btn' + id);
  if (btn) { btn.textContent = '+ Cart'; btn.classList.remove('added'); }
  updateCartUI();
}

function toggleCart() {
  document.getElementById('cartDrawer').classList.toggle('open');
  document.getElementById('cartOverlay').classList.toggle('open');
}

function checkout() {
  cart = [];
  updateCartUI();
  toggleCart();
  applyFilters();
  document.getElementById('successModal').classList.add('open');
}

function closeModal() {
  document.getElementById('successModal').classList.remove('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('searchInput').addEventListener('input', applyFilters);

// Init
applyFilters();
</script>
</body>
</html>
